const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ---------------- design tokens ---------------- */

const CAR_PALETTE = ["#2F6F6B", "#3E6FA0", "#A6653A"];
const DAY_LABELS = ["月", "火", "水", "木", "金", "土", "日"];
const STORAGE_KEYS = { cars: "car-reservation:cars", reservations: "car-reservation:reservations" };

/* ---------------- inline icons (no external icon library needed) ---------------- */

}
const Car = (p) => <Icon {...p}><path d="M5 17h14M5 17a2 2 0 104 0M15 17a2 2 0 104 0M5 17l1.5-5.5A2 2 0 018.4 10h7.2a2 2 0 011.9 1.5L19 17M5 17H3v-3a1 1 0 011-1h1M19 17h2v-3a1 1 0 00-1-1h-1"/></Icon>;
const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;

const Settings2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.9l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.9-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.6 1.7 1.7 0 00-1.9.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.9 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.6-1 1.7 1.7 0 00-.3-1.9l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.9.3h0a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.9-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.9v0a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></Icon>;
const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
const MessageCircle = (p) => <Icon {...p}><path d="M21 11.5a8.4 8.4 0 01-1 4.1 8.5 8.5 0 01-7.6 4.4 8.4 8.4 0 01-4.1-1L3 21l2-4.9a8.4 8.4 0 01-1-4.1 8.5 8.5 0 014.4-7.6 8.4 8.4 0 014.1-1h.5a8.48 8.48 0 018 8v.5z"/></Icon>;

/* ---------------- Google Sheets backend ---------------- */
// ここに、Google Apps Scriptを「ウェブアプリ」として公開したときに発行されるURL（/exec で終わるもの）を貼ってください。
const GAS_URL = "https://script.google.com/macros/s/AKfycbxv048nv_ny1MaZpWS48pUq_6AllicYfWapaKZI0qWuXfTh6qMGvpOuUld3Jw6n65Wj/exec";
const GAS_CONFIGURED = GAS_URL.startsWith("http");

async function gsRequest(params) {
  if (!GAS_CONFIGURED) throw new Error("GAS_URLが未設定です");
  const url = `${GAS_URL}?${new URLSearchParams(params).toString()}`;
  let res;
  try {
    res = await fetch(url, { method: "GET" });
  } catch (e) {
    throw new Error(`Googleスクリプトへの接続に失敗しました：${(e && e.message) || "fetchエラー"}`);
  }
  if (!res.ok) throw new Error(`Googleスクリプトがエラーを返しました（HTTP ${res.status}）`);
  try {
    return await res.json();
  } catch (e) {
    throw new Error("Googleスクリプトの応答を解析できませんでした");
  }
}
async function gsGet(key) {
  const data = await gsRequest({ action: "get", key });
  if (!data || data.value === null || data.value === undefined) return null;
  return { key, value: data.value };
}
async function gsSet(key, valueString) {
  await gsRequest({ action: "set", key, value: valueString });
  return { key, value: valueString };
}

/* ---------------- helpers ---------------- */
const pad = (n) => String(n).padStart(2, "0");
const dateKey = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
const startOfWeek = (d) => { const r = new Date(d); const day = (r.getDay() + 6) % 7; r.setDate(r.getDate() - day); r.setHours(0, 0, 0, 0); return r; };
const toMinutes = (hhmm) => { const [h, m] = hhmm.split(":").map(Number); return h * 60 + m; };
const overlaps = (aStart, aEnd, bStart, bEnd) => toMinutes(aStart) < toMinutes(bEnd) && toMinutes(bStart) < toMinutes(aEnd);
const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
const DAY_MIN = 1440;
const SNAP = 15;
const snapMin = (m) => Math.max(0, Math.min(DAY_MIN, Math.round(m / SNAP) * SNAP));
const minutesToHHMM = (m) => { const mm = Math.max(0, Math.min(DAY_MIN, m)); const h = Math.floor(mm / 60); return `${pad(h === 24 ? 24 : h)}:${pad(mm % 60)}`; };
const lineShareUrl = (text) => `https://line.me/R/msg/text/?text=${encodeURIComponent(text)}`;
const reservationSummary = (r, car) => `【社用車予約】${car?.name || ""}\n${r.date}　${r.start}〜${r.end}\n利用者：${r.name}${r.purpose ? `\n用件：${r.purpose}` : ""}`;
const isToday = (d) => dateKey(d) === dateKey(new Date());
const monthDay = (d) => `${d.getMonth() + 1}/${d.getDate()}`;

const DEFAULT_CARS = [{ id: "car-1", name: "ヤリス", color: CAR_PALETTE[0] }];

/* ---------------- small UI atoms ---------------- */
function Toast({ message, tone }) {
  if (!message) return null;
  const bg = tone === "error" ? COLORS.coral : COLORS.primaryDark;
  return (
    <div style={{ background: bg }} className="fixed bottom-5 left-1/2 -translate-x-1/2 text-white text-sm px-4 py-2.5 rounded-xl shadow-lg z-50 max-w-[92%] text-center break-words">
      {message}
    </div>
  );
}
function IconButton({ onClick, children, title, active, className = "" }) {
  return (
    <button onClick={onClick} title={title}
      style={{ background: active ? COLORS.primary : "transparent", color: active ? "#fff" : COLORS.inkSoft, border: `1px solid ${active ? COLORS.primary : COLORS.line}` }}
      className={`flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${className}`}>
      {children}
    </button>
  );
}

/* ---------------- today timeline ---------------- */
function TodayTimeline({ cars, reservations, selectedDate }) {
  const dayReservations = reservations.filter((r) => r.date === dateKey(selectedDate));
  const now = new Date();
  const nowPct = isToday(selectedDate) ? ((now.getHours() * 60 + now.getMinutes()) / 1440) * 100 : null;
  const hourMarks = [0, 6, 12, 18, 24];
  return (
    <div style={{ background: COLORS.surface, borderColor: COLORS.line }} className="rounded-2xl border p-5">
      <div className="flex items-baseline justify-between mb-4">
        <h2 style={{ color: COLORS.ink, fontFamily: "'Shippori Mincho', serif" }} className="text-lg font-semibold">
          {isToday(selectedDate) ? "本日" : `${monthDay(selectedDate)}(${DAY_LABELS[(selectedDate.getDay() + 6) % 7]})`}の稼働状況
        </h2>
        {nowPct !== null && <span style={{ color: COLORS.primaryDark }} className="text-xs font-medium">現在 {pad(now.getHours())}:{pad(now.getMinutes())}</span>}
      </div>
      <div className="space-y-3">
        {cars.map((car) => {
          const items = dayReservations.filter((r) => r.carId === car.id);
          return (
            <div key={car.id} className="flex items-center gap-3">
              <div className="w-20 shrink-0 flex items-center gap-1.5">
                <span style={{ background: car.color }} className="w-2 h-2 rounded-full shrink-0" />
                <span style={{ color: COLORS.ink }} className="text-sm font-medium truncate">{car.name}</span>
              </div>
              <div style={{ background: COLORS.bg }} className="relative flex-1 h-8 rounded-lg overflow-hidden">
                {hourMarks.map((h) => (<div key={h} style={{ left: `${(h / 24) * 100}%`, background: COLORS.line }} className="absolute top-0 bottom-0 w-px" />))}
                {items.map((r) => (
                  <div key={r.id} title={`${r.start}〜${r.end} ${r.name}`}
                    style={{ left: `${(toMinutes(r.start) / 1440) * 100}%`, width: `${((toMinutes(r.end) - toMinutes(r.start)) / 1440) * 100}%`, background: car.color }}
                    className="absolute top-1 bottom-1 rounded-md flex items-center px-2 text-white text-[11px] font-medium whitespace-nowrap overflow-hidden">
                    {r.name}
                  </div>
                ))}
                {nowPct !== null && <div style={{ left: `${nowPct}%`, background: COLORS.coral }} className="absolute top-0 bottom-0 w-[2px]" />}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ color: COLORS.inkSoft }} className="flex justify-between text-[11px] mt-1.5 pl-[92px]">
        <span>0:00</span><span>6:00</span><span>12:00</span><span>18:00</span><span>24:00</span>
      </div>
    </div>
  );
}

/* ---------------- week grid ---------------- */
function WeekGrid({ cars, reservations, weekStart, selectedDate, onSelectDate }) {
  const days = Array.from({ length: 7 }, (_, i) => addDays(weekStart, i));
  const daysData = days.map((d) => { const key = dateKey(d); return { date: d, key, items: reservations.filter((r) => r.date === key) }; });
  return (
    <div style={{ background: COLORS.surface, borderColor: COLORS.line }} className="rounded-2xl border overflow-hidden">
      <div className="sm:hidden">
        {daysData.map(({ date, key, items }, i) => {
          const selected = key === dateKey(selectedDate);
          return (
            <button key={key} onClick={() => onSelectDate(date)}
              style={{ background: selected ? COLORS.bg : COLORS.surface, borderColor: COLORS.line, borderBottomWidth: i === daysData.length - 1 ? 0 : 1 }}
              className="w-full text-left p-3 flex gap-3 border-b">
              <div className="w-12 shrink-0 flex flex-col items-center pt-0.5">
                <span style={{ color: isToday(date) ? COLORS.coral : COLORS.ink }} className="text-base font-semibold leading-none">{monthDay(date)}</span>
                <span style={{ color: COLORS.inkSoft }} className="text-[11px] mt-0.5">{DAY_LABELS[(date.getDay() + 6) % 7]}</span>
              </div>
              <div className="flex-1 min-w-0 flex flex-col gap-1.5">
                {items.length === 0 ? (
                  <span style={{ color: COLORS.inkSoft }} className="text-xs py-1">予約なし</span>
                ) : (
                  items.map((r) => {
                    const car = cars.find((c) => c.id === r.carId);
                    return (
                      <div key={r.id} style={{ background: (car?.color || COLORS.primary) + "1A", color: car?.color || COLORS.primary }} className="text-xs rounded-lg px-2.5 py-1.5 font-medium">
                        {r.start}〜{r.end}　{car?.name}・{r.name}
                      </div>
                    );
                  })
                )}
              </div>
            </button>
          );
        })}
      </div>
      <div className="hidden sm:grid sm:grid-cols-7">
        {daysData.map(({ date, key, items }) => {
          const selected = key === dateKey(selectedDate);
          return (
            <button key={key} onClick={() => onSelectDate(date)}
              style={{ borderColor: COLORS.line, background: selected ? COLORS.bg : COLORS.surface }}
              className="border-r border-b last:border-r-0 p-2.5 text-left min-h-[112px] align-top flex flex-col gap-1">
              <div className="flex items-baseline gap-1.5">
                <span style={{ color: isToday(date) ? COLORS.coral : COLORS.ink }} className="text-sm font-semibold">{monthDay(date)}</span>
                <span style={{ color: COLORS.inkSoft }} className="text-xs">{DAY_LABELS[(date.getDay() + 6) % 7]}</span>
              </div>
              <div className="flex flex-col gap-1">
                {items.map((r) => {
                  const car = cars.find((c) => c.id === r.carId);
                  return (
                    <div key={r.id} style={{ background: (car?.color || COLORS.primary) + "1A", color: car?.color || COLORS.primary }} className="text-[11px] rounded px-1.5 py-1 font-medium truncate">
                      {r.start}　{car?.name}・{r.name}
                    </div>
                  );
                })}
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ---------------- list view ---------------- */
function ReservationListView({ cars, reservations, onDelete }) {
  const sorted = [...reservations].sort((a, b) => (a.date + a.start).localeCompare(b.date + b.start));
  const today = dateKey(new Date());
  const upcoming = sorted.filter((r) => r.date >= today);
  if (upcoming.length === 0) {
    return (
      <div style={{ background: COLORS.surface, borderColor: COLORS.line, color: COLORS.inkSoft }} className="rounded-2xl border p-10 text-center text-sm">
        予約はまだありません。右上の「予約する」から追加してください。
      </div>
    );
  }
  return (
    <div style={{ background: COLORS.surface, borderColor: COLORS.line }} className="rounded-2xl border divide-y">
      {upcoming.map((r) => {
        const car = cars.find((c) => c.id === r.carId);
        const d = new Date(r.date + "T00:00:00");
        return (
          <div key={r.id} style={{ borderColor: COLORS.line }} className="flex items-center gap-4 p-4">
            <div style={{ background: car?.color }} className="w-2.5 h-2.5 rounded-full shrink-0" />
            <div className="w-24 shrink-0">
              <div style={{ color: COLORS.ink }} className="text-sm font-semibold">{monthDay(d)}({DAY_LABELS[(d.getDay() + 6) % 7]})</div>
              <div style={{ color: COLORS.inkSoft }} className="text-xs">{r.start}〜{r.end}</div>
            </div>
            <div className="flex-1 min-w-0">
              <div style={{ color: COLORS.ink }} className="text-sm font-medium truncate">{car?.name} ・ {r.name}</div>
              {r.purpose && <div style={{ color: COLORS.inkSoft }} className="text-xs truncate">{r.purpose}</div>}
            </div>
            <a href={lineShareUrl(reservationSummary(r, car))} target="_blank" rel="noopener noreferrer"
              style={{ color: COLORS.inkSoft }} className="p-2 rounded-lg hover:text-white hover:bg-[#06C755] transition-colors shrink-0" title="LINEで共有">
              <MessageCircle size={16} />
            </a>
            <button onClick={() => onDelete(r.id)} style={{ color: COLORS.inkSoft }} className="p-2 rounded-lg hover:text-white hover:bg-[#C15B4A] transition-colors shrink-0" title="削除">
              <Trash2 size={16} />
            </button>
          </div>
        );
      })}
    </div>
  );
}

/* ---------------- draggable time-range track ---------------- */
function TimeRangeTrack({ startMin, endMin, onChangeRange, contextBlocks, color }) {
  const trackRef = useRef(null);
  const modeRef = useRef(null);
  const anchorRef = useRef({ pointerMin: 0, startMin: 0, endMin: 0 });
  const hourMarks = [0, 6, 12, 18, 24];
  const minutesFromClientX = (clientX) => {
    const rect = trackRef.current.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return snapMin(ratio * DAY_MIN);
  };
  const endDrag = () => { modeRef.current = null; };
  const onTrackPointerDown = (e) => {
    if (modeRef.current) return;
    e.currentTarget.setPointerCapture(e.pointerId);
    const m = minutesFromClientX(e.clientX);
    modeRef.current = "create";
    anchorRef.current.pointerMin = m;
    onChangeRange(m, Math.min(m + 60, DAY_MIN));
  };
  const onTrackPointerMove = (e) => {
    if (modeRef.current !== "create") return;
    const cur = minutesFromClientX(e.clientX);
    const anchor = anchorRef.current.pointerMin;
    let s = Math.min(anchor, cur);
    let en = Math.max(anchor, cur);
    if (en - s < SNAP) en = Math.min(DAY_MIN, s + SNAP);
    onChangeRange(s, en);
  };
  const onHandleDown = (side) => (e) => { e.stopPropagation(); e.currentTarget.setPointerCapture(e.pointerId); modeRef.current = side; };
  const onHandleMove = (side) => (e) => {
    if (modeRef.current !== side) return;
    const m = minutesFromClientX(e.clientX);
    if (side === "start") onChangeRange(Math.min(m, endMin - SNAP), endMin);
    else onChangeRange(startMin, Math.max(m, startMin + SNAP));
  };
  const onBlockDown = (e) => { e.stopPropagation(); e.currentTarget.setPointerCapture(e.pointerId); modeRef.current = "move"; anchorRef.current = { pointerMin: minutesFromClientX(e.clientX), startMin, endMin }; };
  const onBlockMove = (e) => {
    if (modeRef.current !== "move") return;
    const m = minutesFromClientX(e.clientX);
    const duration = anchorRef.current.endMin - anchorRef.current.startMin;
    const delta = m - anchorRef.current.pointerMin;
    let s = snapMin(anchorRef.current.startMin + delta);
    s = Math.max(0, Math.min(DAY_MIN - duration, s));
    onChangeRange(s, s + duration);
  };
  const nudge = (side, deltaMin) => {
    if (side === "start") onChangeRange(Math.max(0, Math.min(startMin + deltaMin, endMin - SNAP)), endMin);
    else onChangeRange(startMin, Math.min(DAY_MIN, Math.max(endMin + deltaMin, startMin + SNAP)));
  };
  const leftPct = (startMin / DAY_MIN) * 100;
  const widthPct = ((endMin - startMin) / DAY_MIN) * 100;
  return (
    <div>
      <div className="flex items-center justify-between mb-1.5">
        <span style={{ color: COLORS.ink }} className="text-sm font-semibold">{minutesToHHMM(startMin)} 〜 {minutesToHHMM(endMin)}</span>
        <span style={{ color: COLORS.inkSoft }} className="text-[11px]">ドラッグして時間帯を選択</span>
      </div>
      <div ref={trackRef} onPointerDown={onTrackPointerDown} onPointerMove={onTrackPointerMove} onPointerUp={endDrag} onPointerCancel={endDrag}
        style={{ background: COLORS.bg, touchAction: "none" }} className="relative h-12 rounded-lg overflow-hidden select-none cursor-pointer">
        {hourMarks.map((h) => (<div key={h} style={{ left: `${(h / 24) * 100}%`, background: COLORS.line }} className="absolute top-0 bottom-0 w-px" />))}
        {contextBlocks.map((b, i) => (
          <div key={i} style={{ left: `${(b.start / DAY_MIN) * 100}%`, width: `${((b.end - b.start) / DAY_MIN) * 100}%`, background: COLORS.line }}
            className="absolute top-1.5 bottom-1.5 rounded" title={`予約済み ${minutesToHHMM(b.start)}〜${minutesToHHMM(b.end)}`} />
        ))}
        <div onPointerDown={onBlockDown} onPointerMove={onBlockMove} onPointerUp={endDrag} onPointerCancel={endDrag}
          style={{ left: `${leftPct}%`, width: `${widthPct}%`, background: color, touchAction: "none" }} className="absolute top-1 bottom-1 rounded-md cursor-grab active:cursor-grabbing">
          <div onPointerDown={onHandleDown("start")} onPointerMove={onHandleMove("start")} onPointerUp={endDrag} onPointerCancel={endDrag}
            style={{ touchAction: "none" }} className="absolute -left-2 top-0 bottom-0 w-4 cursor-ew-resize flex items-center justify-center">
            <div className="w-1 h-6 rounded-full bg-white/90" />
          </div>
          <div onPointerDown={onHandleDown("end")} onPointerMove={onHandleMove("end")} onPointerUp={endDrag} onPointerCancel={endDrag}
            style={{ touchAction: "none" }} className="absolute -right-2 top-0 bottom-0 w-4 cursor-ew-resize flex items-center justify-center">
            <div className="w-1 h-6 rounded-full bg-white/90" />
          </div>
        </div>
      </div>
      <div style={{ color: COLORS.inkSoft }} className="flex justify-between text-[11px] mt-1">
        <span>0:00</span><span>6:00</span><span>12:00</span><span>18:00</span><span>24:00</span>
      </div>
      <div className="flex items-center justify-between gap-3 mt-2.5">
        <div className="flex items-center gap-1.5">
          <span style={{ color: COLORS.inkSoft }} className="text-[11px]">開始</span>
          <button onClick={() => nudge("start", -SNAP)} style={{ borderColor: COLORS.line, color: COLORS.ink }} className="w-7 h-7 border rounded-md text-xs">−</button>
          <button onClick={() => nudge("start", SNAP)} style={{ borderColor: COLORS.line, color: COLORS.ink }} className="w-7 h-7 border rounded-md text-xs">＋</button>
        </div>
        <div className="flex items-center gap-1.5">
          <span style={{ color: COLORS.inkSoft }} className="text-[11px]">終了</span>
          <button onClick={() => nudge("end", -SNAP)} style={{ borderColor: COLORS.line, color: COLORS.ink }} className="w-7 h-7 border rounded-md text-xs">−</button>
          <button onClick={() => nudge("end", SNAP)} style={{ borderColor: COLORS.line, color: COLORS.ink }} className="w-7 h-7 border rounded-md text-xs">＋</button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- reservation form ---------------- */
function ReservationForm({ cars, reservations, defaultDate, onSubmit, onClose }) {
  const [carId, setCarId] = useState(cars[0]?.id || "");
  const [date, setDate] = useState(dateKey(defaultDate));
  const [startMin, setStartMin] = useState(9 * 60);
  const [endMin, setEndMin] = useState(10 * 60);
  const [name, setName] = useState("");
  const [purpose, setPurpose] = useState("");
  const [error, setError] = useState("");
  const [submitted, setSubmitted] = useState(null);

  const contextBlocks = useMemo(
    () => reservations.filter((r) => r.carId === carId && r.date === date).map((r) => ({ start: toMinutes(r.start), end: toMinutes(r.end) })),
    [reservations, carId, date]
  );
  const setRange = (s, e) => { setStartMin(s); setEndMin(e); };

  const submit = () => {
    const start = minutesToHHMM(startMin);
    const end = minutesToHHMM(endMin);
    if (!carId) return setError("車両を選択してください。");
    if (!name.trim()) return setError("利用者名を入力してください。");
    if (endMin <= startMin) return setError("終了時刻は開始時刻より後にしてください。");
    const conflict = reservations.some((r) => r.carId === carId && r.date === date && overlaps(r.start, r.end, start, end));
    if (conflict) return setError("その時間帯はすでに予約が入っています。");
    const record = { id: uid(), carId, date, start, end, name: name.trim(), purpose: purpose.trim() };
    onSubmit(record);
    setSubmitted(record);
  };

  if (submitted) {
    const car = cars.find((c) => c.id === submitted.carId);
    return (
      <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" onClick={onClose}>
        <div style={{ background: COLORS.surface }} className="rounded-2xl p-6 w-full max-w-sm shadow-xl text-center" onClick={(e) => e.stopPropagation()}>
          <div style={{ background: COLORS.primary }} className="w-11 h-11 rounded-full flex items-center justify-center mx-auto mb-3">
            <Check size={22} color="#fff" />
          </div>
          <h3 style={{ color: COLORS.ink, fontFamily: "'Shippori Mincho', serif" }} className="text-lg font-semibold mb-1">予約しました</h3>
          <p style={{ color: COLORS.inkSoft }} className="text-sm mb-5">{car?.name}・{submitted.date}　{submitted.start}〜{submitted.end}</p>
          <a href={lineShareUrl(reservationSummary(submitted, car))} target="_blank" rel="noopener noreferrer"
            style={{ background: "#06C755" }} className="w-full flex items-center justify-center gap-2 text-white rounded-lg py-2.5 text-sm font-semibold mb-2.5">
            <MessageCircle size={17} /> LINEで共有する
          </a>
          <button onClick={onClose} style={{ borderColor: COLORS.line, color: COLORS.ink }} className="w-full border rounded-lg py-2.5 text-sm font-medium">閉じる</button>
        </div>
      </div>
    );
  }

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div style={{ background: COLORS.surface }} className="rounded-2xl p-6 w-full max-w-sm shadow-xl" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h3 style={{ color: COLORS.ink, fontFamily: "'Shippori Mincho', serif" }} className="text-lg font-semibold">予約する</h3>
          <button onClick={onClose} style={{ color: COLORS.inkSoft }}><X size={20} /></button>
        </div>
        <div className="space-y-3.5">
          <div>
            <label style={{ color: COLORS.inkSoft }} className="text-xs font-medium block mb-1.5">車両</label>
            <div className="flex gap-2 flex-wrap">
              {cars.map((c) => (
                <button key={c.id} onClick={() => setCarId(c.id)}
                  style={{ background: carId === c.id ? c.color : COLORS.bg, color: carId === c.id ? "#fff" : COLORS.ink, border: `1px solid ${carId === c.id ? c.color : COLORS.line}` }}
                  className="px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5">
                  <Car size={14} /> {c.name}
                </button>
              ))}
            </div>
          </div>
          <div>
            <label style={{ color: COLORS.inkSoft }} className="text-xs font-medium block mb-1.5">日付</label>
            <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={{ borderColor: COLORS.line, color: COLORS.ink }} className="w-full border rounded-lg px-3 py-2 text-sm" />
          </div>
          <div>
            <label style={{ color: COLORS.inkSoft }} className="text-xs font-medium block mb-1.5">利用時間</label>
            <TimeRangeTrack startMin={startMin} endMin={endMin} onChangeRange={setRange} contextBlocks={contextBlocks} color={cars.find((c) => c.id === carId)?.color || COLORS.primary} />
          </div>
          <div>
            <label style={{ color: COLORS.inkSoft }} className="text-xs font-medium block mb-1.5">利用者名</label>
            <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="山田 太郎" style={{ borderColor: COLORS.line, color: COLORS.ink }} className="w-full border rounded-lg px-3 py-2 text-sm" />
          </div>
          <div>
            <label style={{ color: COLORS.inkSoft }} className="text-xs font-medium block mb-1.5">行先・用件（任意）</label>
            <input type="text" value={purpose} onChange={(e) => setPurpose(e.target.value)} placeholder="○○商事 訪問" style={{ borderColor: COLORS.line, color: COLORS.ink }} className="w-full border rounded-lg px-3 py-2 text-sm" />
          </div>
          {error && <div style={{ color: COLORS.coral }} className="text-xs font-medium">{error}</div>}
          <button onClick={submit} style={{ background: COLORS.primary }} className="w-full text-white rounded-lg py-2.5 text-sm font-semibold mt-1 hover:opacity-90 transition-opacity">予約を確定する</button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- car settings panel ---------------- */
function CarSettings({ cars, onChange, onClose }) {
  const [local, setLocal] = useState(cars);
  const updateName = (id, name) => setLocal(local.map((c) => (c.id === id ? { ...c, name } : c)));
  const addCar = () => {
    if (local.length >= 3) return;
    const usedColors = local.map((c) => c.color);
    const color = CAR_PALETTE.find((c) => !usedColors.includes(c)) || CAR_PALETTE[0];
    setLocal([...local, { id: uid(), name: `社用車${local.length + 1}`, color }]);
  };
  const removeCar = (id) => { if (local.length <= 1) return; setLocal(local.filter((c) => c.id !== id)); };
  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div style={{ background: COLORS.surface }} className="rounded-2xl p-6 w-full max-w-sm shadow-xl" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h3 style={{ color: COLORS.ink, fontFamily: "'Shippori Mincho', serif" }} className="text-lg font-semibold">車両の設定</h3>
          <button onClick={onClose} style={{ color: COLORS.inkSoft }}><X size={20} /></button>
        </div>
        <div className="space-y-2.5">
          {local.map((c) => (
            <div key={c.id} className="flex items-center gap-2">
              <span style={{ background: c.color }} className="w-3 h-3 rounded-full shrink-0" />
              <input value={c.name} onChange={(e) => updateName(c.id, e.target.value)} style={{ borderColor: COLORS.line, color: COLORS.ink }} className="flex-1 border rounded-lg px-3 py-1.5 text-sm" />
              <button onClick={() => removeCar(c.id)} disabled={local.length <= 1} style={{ color: local.length <= 1 ? COLORS.line : COLORS.inkSoft }} className="p-1.5"><Trash2 size={15} /></button>
            </div>
          ))}
        </div>
        {local.length < 3 && (
          <button onClick={addCar} style={{ color: COLORS.primaryDark, borderColor: COLORS.line }} className="w-full border rounded-lg py-2 text-sm font-medium mt-3 flex items-center justify-center gap-1.5">
            <Plus size={15} /> 車両を追加
          </button>
        )}
        <button onClick={() => onChange(local)} style={{ background: COLORS.primary }} className="w-full text-white rounded-lg py-2.5 text-sm font-semibold mt-4 flex items-center justify-center gap-1.5">
          <Check size={16} /> 保存する
        </button>
      </div>
    </div>
  );
}

/* ---------------- main app ---------------- */
function CarReservationApp() {
  const [cars, setCars] = useState(DEFAULT_CARS);
  const [reservations, setReservations] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [syncStatus, setSyncStatus] = useState(null);
  const [view, setView] = useState("calendar");
  const [selectedDate, setSelectedDate] = useState(new Date());
  const [weekStart, setWeekStart] = useState(startOfWeek(new Date()));
  const [showForm, setShowForm] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [toast, setToast] = useState({ message: "", tone: "info" });

  const loadData = useCallback(async () => {
    const result = { carsOk: false, resvOk: false, carsErr: "", resvErr: "" };
    try {
      const carsRes = await gsGet(STORAGE_KEYS.cars);
      setCars(carsRes ? JSON.parse(carsRes.value) : DEFAULT_CARS);
      result.carsOk = true;
    } catch (e) {
      setCars(DEFAULT_CARS);
      result.carsErr = (e && (e.message || e.toString())) || "不明なエラー";
    }
    try {
      const resvRes = await gsGet(STORAGE_KEYS.reservations);
      setReservations(resvRes ? JSON.parse(resvRes.value) : []);
      result.resvOk = true;
    } catch (e) {
      setReservations([]);
      result.resvErr = (e && (e.message || e.toString())) || "不明なエラー";
    }
    setSyncStatus({ ...result, checkedAt: new Date() });
    setLoaded(true);
  }, []);

  useEffect(() => { loadData(); }, [loadData]);

  const notify = (message, tone = "info") => {
    setToast({ message, tone });
    setTimeout(() => setToast({ message: "", tone: "info" }), tone === "error" ? 6000 : 2200);
  };

  const persistCars = async (next) => {
    setCars(next);
    try { await gsSet(STORAGE_KEYS.cars, JSON.stringify(next)); }
    catch (e) { notify(`保存に失敗しました：${(e && (e.message || e.toString())) || "不明なエラー"}`, "error"); }
  };
  const persistReservations = async (next) => {
    setReservations(next);
    try { await gsSet(STORAGE_KEYS.reservations, JSON.stringify(next)); }
    catch (e) { notify(`保存に失敗しました：${(e && (e.message || e.toString())) || "不明なエラー"}`, "error"); }
  };
  const addReservation = (r) => { persistReservations([...reservations, r]); notify("予約しました。"); };
  const deleteReservation = (id) => { persistReservations(reservations.filter((r) => r.id !== id)); notify("削除しました。"); };
  const goWeek = (dir) => setWeekStart(addDays(weekStart, dir * 7));
  const weekLabel = `${monthDay(weekStart)}〜${monthDay(addDays(weekStart, 6))}`;

  if (!loaded) {
    return <div style={{ background: COLORS.bg }} className="min-h-screen flex items-center justify-center"><span style={{ color: COLORS.inkSoft }} className="text-sm">読み込み中…</span></div>;
  }

  return (
    <div style={{ background: COLORS.bg, fontFamily: "'Zen Kaku Gothic New', sans-serif" }} className="min-h-screen pb-16">
      <div className="max-w-3xl mx-auto px-4 pt-8 space-y-5">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <div style={{ background: COLORS.primary }} className="w-9 h-9 rounded-xl flex items-center justify-center"><Car size={18} color="#fff" /></div>
            <h1 style={{ color: COLORS.ink, fontFamily: "'Shippori Mincho', serif" }} className="text-2xl font-bold tracking-tight">社用車予約</h1>
          </div>
          <button onClick={() => setShowSettings(true)} style={{ color: COLORS.inkSoft }} title="車両の設定"><Settings2 size={19} /></button>
        </div>

        {!GAS_CONFIGURED ? (
          <div style={{ background: "#FBF3E3", borderColor: COLORS.amber, color: COLORS.amber }} className="rounded-xl border px-3.5 py-2.5 text-xs flex items-start gap-2">
            <AlertTriangle size={14} className="mt-0.5 shrink-0" />
            <div>Google Apps ScriptのURLが未設定です。コード内の <span className="font-mono">GAS_URL</span> を設定してください。</div>
          </div>
        ) : (
          syncStatus && (
            <div style={{
              background: syncStatus.carsOk && syncStatus.resvOk ? COLORS.surface : "#FBEAE7",
              borderColor: syncStatus.carsOk && syncStatus.resvOk ? COLORS.line : COLORS.coral,
              color: syncStatus.carsOk && syncStatus.resvOk ? COLORS.inkSoft : COLORS.coral,
            }} className="rounded-xl border px-3.5 py-2.5 text-xs flex items-start gap-2">
              {syncStatus.carsOk && syncStatus.resvOk ? (
                <><Check size={14} className="mt-0.5 shrink-0" /><span>共有データを正常に読み込みました（{syncStatus.checkedAt.toLocaleTimeString("ja-JP")}）</span></>
              ) : (
                <>
                  <AlertTriangle size={14} className="mt-0.5 shrink-0" />
                  <div className="flex-1 min-w-0">
                    <div>共有データの読み込みに失敗しています。</div>
                    {syncStatus.carsErr && <div className="mt-1 font-mono break-words">車両: {syncStatus.carsErr}</div>}
                    {syncStatus.resvErr && <div className="mt-0.5 font-mono break-words">予約: {syncStatus.resvErr}</div>}
                  </div>
                </>
              )}
              <button onClick={loadData} style={{ color: syncStatus.carsOk && syncStatus.resvOk ? COLORS.inkSoft : COLORS.coral }} className="shrink-0 p-1 -m-1" title="再読み込み"><RefreshCw size={14} /></button>
            </div>
          )
        )}

        <TodayTimeline cars={cars} reservations={reservations} selectedDate={selectedDate} />

        <div className="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
          <div className="grid grid-cols-2 gap-1.5 sm:flex sm:w-auto sm:gap-1">
            <IconButton onClick={() => setView("calendar")} active={view === "calendar"} className="flex-1 sm:flex-initial"><CalendarDays size={15} /> カレンダー</IconButton>
            <IconButton onClick={() => setView("list")} active={view === "list"} className="flex-1 sm:flex-initial"><List size={15} /> 一覧</IconButton>
          </div>
          <button onClick={() => setShowForm(true)} style={{ background: COLORS.primary }} className="flex items-center justify-center gap-1.5 text-white text-sm font-semibold px-4 py-2.5 rounded-lg hover:opacity-90 w-full sm:w-auto">
            <Plus size={16} /> 予約する
          </button>
        </div>

        {view === "calendar" ? (
          <>
            <div className="flex items-center justify-center gap-4">
              <button onClick={() => goWeek(-1)} style={{ color: COLORS.inkSoft }}><ChevronLeft size={18} /></button>
              <span style={{ color: COLORS.ink }} className="text-sm font-medium">{weekLabel}</span>
              <button onClick={() => goWeek(1)} style={{ color: COLORS.inkSoft }}><ChevronRight size={18} /></button>
            </div>
            <WeekGrid cars={cars} reservations={reservations} weekStart={weekStart} selectedDate={selectedDate} onSelectDate={setSelectedDate} />
          </>
        ) : (
          <ReservationListView cars={cars} reservations={reservations} onDelete={deleteReservation} />
        )}
      </div>

      {showForm && <ReservationForm cars={cars} reservations={reservations} defaultDate={selectedDate} onSubmit={addReservation} onClose={() => setShowForm(false)} />}
      {showSettings && (
        <CarSettings cars={cars} onClose={() => setShowSettings(false)} onChange={(next) => { persistCars(next); setShowSettings(false); notify("車両情報を保存しました。"); }} />
      )}
      <Toast message={toast.message} tone={toast.tone} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CarReservationApp />);
